name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # ponytail: manifest install runs in cmake; skip GHA binary cache (needs token in same step)
      VCPKG_BINARY_SOURCES: clear
      QT_ROOT: ${{ github.workspace }}/Qt
      QT_VERSION: "6.11.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.11.0"
          host: windows
          target: desktop
          arch: win64_mingw
          tools: tools_mingw1310
          dir: ${{ github.workspace }}
          install-deps: true
          cache: true
          # ponytail: aqt 3.3.0 lacks Qt 6.11 repo layout; master has the fix (miurahr/aqtinstall#959)
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@master

      - name: Install Ninja
        run: choco install ninja -y

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: b322364f06308bdd24823f9d8f03fe0cc86fd46f
          runVcpkgInstall: false

      - name: Configure
        shell: pwsh
        run: |
          cmake --preset ci-windows `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT/$env:QT_VERSION/mingw_64" `
            -DCMAKE_C_COMPILER="$env:QT_ROOT/Tools/mingw1310_64/bin/gcc.exe" `
            -DCMAKE_CXX_COMPILER="$env:QT_ROOT/Tools/mingw1310_64/bin/g++.exe"
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        shell: pwsh
        run: ./scripts/package-windows.ps1 -Version 0.0.0-ci -BuildDir build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lgm-windows-ci
          path: |
            dist/LGM-0.0.0-ci-win64-portable.zip
            dist/LGM-0.0.0-ci-win64-setup.exe
