name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # ponytail: manifest install runs in cmake; skip GHA binary cache (needs token in same step)
      VCPKG_BINARY_SOURCES: clear
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          host: windows
          target: desktop
          arch: win64_mingw
          tools: tools_mingw1310
          install-deps: true
          cache: true
          aqtversion: ">=3.2.0"

      - name: Install Ninja
        run: choco install ninja -y

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: b322364f06308bdd24823f9d8f03fe0cc86fd46f
          runVcpkgInstall: false

      - name: Configure
        shell: pwsh
        run: |
          $qtRoot = Split-Path (Split-Path $env:CMAKE_PREFIX_PATH -Parent) -Parent
          cmake --preset ci-windows `
            -DCMAKE_MAKE_PROGRAM="$qtRoot/Tools/Ninja/ninja.exe" `
            -DCMAKE_C_COMPILER="$qtRoot/Tools/mingw1310_64/bin/gcc.exe" `
            -DCMAKE_CXX_COMPILER="$qtRoot/Tools/mingw1310_64/bin/g++.exe"
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        shell: pwsh
        run: ./scripts/package-windows.ps1 -Version 0.0.0-ci -BuildDir build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lgm-windows-ci
          path: |
            dist/LGM-0.0.0-ci-win64-portable.zip
            dist/LGM-0.0.0-ci-win64-setup.exe
