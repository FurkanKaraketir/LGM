name: Wiki

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "src/assets/guides/**"
      - "Examples/README.md"
      - "wiki/**"
      - "scripts/sync-wiki.py"
      - ".github/workflows/wiki.yml"
  release:
    types: [published]

concurrency:
  group: wiki-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wiki pages
        run: python scripts/sync-wiki.py -o wiki-out

      - name: Push to wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git clone "$WIKI_URL" wiki-repo 2>/dev/null || mkdir -p wiki-repo

          cd wiki-repo
          if [ ! -d .git ]; then
            git init
            git remote add origin "$WIKI_URL"
            git checkout -b master
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -r ../wiki-out/* . 

          git add -A
          if git diff --staged --quiet; then
            echo "Wiki already up to date"
            exit 0
          fi

          git commit -m "Sync wiki from ${{ github.sha }}"
          git push origin HEAD:master
