name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            qt_arch: win64_mingw
            preset: ci-windows
          - name: macos
            os: macos-latest
            qt_arch: osx_arm64
            preset: ci-macos
            extra_cmake: -DLGM_MACOS_BUNDLE=ON
          - name: linux
            os: ubuntu-latest
            qt_arch: linux_gcc_64
            preset: ci-linux

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: qtnetwork
          cache: true

      - name: Install Inno Setup
        if: matrix.name == 'windows'
        run: choco install innosetup -y

      - name: Install Linux packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libxkbcommon-dev libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xinput0 libxcb-xkb1 \
            libfontconfig1-dev libfreetype6-dev libdbus-1-dev \
            file wget fuse libfuse2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 2024.12.16
          runVcpkgInstall: true

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} ${{ matrix.extra_cmake || '' }}
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        shell: pwsh
        if: matrix.name == 'windows'
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          ./scripts/package-windows.ps1 -Version $version -BuildDir build

      - name: Package
        if: matrix.name == 'macos'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash ./scripts/package-macos.sh "$VERSION" build

      - name: Package
        if: matrix.name == 'linux'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash ./scripts/package-linux.sh "$VERSION" build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lgm-${{ matrix.name }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Flatten release files
        run: |
          find dist -mindepth 2 -type f -exec mv -t dist {} +
          find dist -type d -empty -delete 2>/dev/null || true
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
