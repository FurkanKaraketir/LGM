name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_BINARY_SOURCES: clear
      QT_ROOT: ${{ github.workspace }}/Qt
      QT_VERSION: "6.11.0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            qt_host: windows
            qt_arch: win64_mingw
            qt_tools: tools_mingw1310
            preset: ci-windows
          - name: macos
            os: macos-latest
            qt_host: mac
            qt_arch: osx_arm64
            qt_tools: ""
            qt_prefix: macos
            preset: ci-macos
            extra_cmake: -DLGM_MACOS_BUNDLE=ON
          - name: linux
            os: ubuntu-latest
            qt_host: linux
            qt_arch: linux_gcc_64
            qt_tools: ""
            qt_prefix: gcc_64
            preset: ci-linux

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.11.0"
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          tools: ${{ matrix.qt_tools }}
          dir: ${{ github.workspace }}/Qt
          install-deps: true
          cache: true
          aqtversion: ">=3.2.0"

      - name: Install Ninja
        if: matrix.name == 'windows'
        run: choco install ninja -y

      - name: Install Inno Setup
        if: matrix.name == 'windows'
        run: choco install innosetup -y

      - name: Install Linux packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libxkbcommon-dev libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xinput0 libxcb-xkb1 \
            libfontconfig1-dev libfreetype6-dev libdbus-1-dev \
            file wget fuse libfuse2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: b322364f06308bdd24823f9d8f03fe0cc86fd46f
          runVcpkgInstall: false

      - name: Configure
        shell: bash
        if: matrix.name != 'windows'
        run: |
          cmake --preset ${{ matrix.preset }} ${{ matrix.extra_cmake || '' }} \
            -DCMAKE_PREFIX_PATH="$QT_ROOT/$QT_VERSION/${{ matrix.qt_prefix }}"
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Configure
        shell: pwsh
        if: matrix.name == 'windows'
        run: |
          cmake --preset ${{ matrix.preset }} `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT/$env:QT_VERSION/mingw_64" `
            -DCMAKE_C_COMPILER="$env:QT_ROOT/Tools/mingw1310_64/bin/gcc.exe" `
            -DCMAKE_CXX_COMPILER="$env:QT_ROOT/Tools/mingw1310_64/bin/g++.exe" `
            ${{ matrix.extra_cmake || '' }}
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        shell: pwsh
        if: matrix.name == 'windows'
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          ./scripts/package-windows.ps1 -Version $version -BuildDir build

      - name: Package
        if: matrix.name == 'macos'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash ./scripts/package-macos.sh "$VERSION" build

      - name: Package
        if: matrix.name == 'linux'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash ./scripts/package-linux.sh "$VERSION" build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lgm-${{ matrix.name }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Flatten release files
        run: |
          find dist -mindepth 2 -type f -exec mv -t dist {} +
          find dist -type d -empty -delete 2>/dev/null || true
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
